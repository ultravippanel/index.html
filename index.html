<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    background:#fff; /* changed */
    color:#000; /* changed for visibility */
    font-family:Arial;
    text-align:center;
}

/* TITLE */
h1 {
    font-size:40px;
    color:#007bff; /* changed */
    text-shadow:0 0 15px #007bff; /* changed */
}

.sub {
    color:gold;
    letter-spacing:3px;
}

/* MAIN BOX */
.box {
    border:2px solid #007bff; /* changed */
    border-radius:15px;
    padding:20px;
    margin:15px;
    box-shadow:0 0 20px #007bff; /* changed */
}

/* BIG TEXT */
h2 {
    font-size:50px;
    color:#007bff; /* changed */
    text-shadow:0 0 20px #007bff; /* changed */
}

/* NUMBER BOX */
.numbers {
    border:2px dashed gold;
    padding:10px;
    margin-top:10px;
    color:gold;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th {
    color:#555; /* adjusted for white bg */
}

td {
    padding:10px;
}

/* STATUS */
.win {
    color:#007bff; /* changed */
    font-weight:bold;
}

.loss {
    color:red;
    font-weight:bold;
}

/* BUTTON */
button {
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#007bff; /* changed */
    color:#fff; /* changed */
    font-weight:bold;
}

/* ADMIN PANEL */
input {
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:1px solid #ccc; /* slight visible fix */
}
</style>
</head>

<body>

<div id="mainPanel">
    <h1>VIP PANEL</h1>
    <p class="sub">VIP TRADER</p>

    <div class="box">
        <p>PERIOD: <span id="period"></span></p>
        <h2 id="result"></h2>

        <div class="numbers">
            NUMBERS: <span id="numbers"></span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>PRD</th>
                <th>PRED</th>
                <th>NUM</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>

    <button onclick="openAdmin()">ADMIN PANEL</button>
</div>

<div id="adminPanel" style="display:none;">
    <h2>ADMIN</h2>

    <input id="periodInput" placeholder="Period"><br>
    <input id="resultInput" placeholder="BIG/SMALL"><br>
    <input id="numberInput" placeholder="Number"><br>
    <input id="statusInput" placeholder="WIN/LOSS"><br>

    <button onclick="updateData()">UPDATE</button>
    <button onclick="back()">BACK</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("vipData")) || {
    period:"20260325100010156",
    result:"BIG",
    numbers:"9,3",
    history:[]
};

function load(){
    document.getElementById("period").innerText = data.period;
    document.getElementById("result").innerText = data.result;
    document.getElementById("numbers").innerText = data.numbers;

    let table = document.getElementById("history");
    table.innerHTML = "";

    data.history.slice().reverse().forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.prd}</td>
            <td>${item.pred}</td>
            <td>${item.num}</td>
            <td class="${item.status=='WIN'?'win':'loss'}">
                ${item.status} ${item.status=='WIN'?'🦊':'🖤'}
            </td>
        </tr>`;
    });
}

load();

function openAdmin(){
    mainPanel.style.display="none";
    adminPanel.style.display="block";
}

function back(){
    mainPanel.style.display="block";
    adminPanel.style.display="none";
}

function updateData(){
    let prd = periodInput.value;
    let res = resultInput.value;
    let num = numberInput.value;
    let status = statusInput.value;

    data.period = prd;
    data.result = res;
    data.numbers = num;

    data.history.push({
        prd: prd.slice(-3),
        pred: res,
        num: num,
        status: status
    });

    localStorage.setItem("vipData", JSON.stringify(data));

    alert("Updated ✅");
    back();
    load();
}
</script>

</body>
</html>
