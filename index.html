<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

/* CARD */

.card{
    background:#fff;
    border-radius:25px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* TITLE */

.main-title{
    text-align:center;
    margin-bottom:25px;
}

.main-title h1{
    font-size:55px;
    font-weight:900;
    background:linear-gradient(to bottom,#4ea1ff,#003cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.main-title p{
    margin-top:10px;
    color:#0055ff;
    letter-spacing:5px;
    font-size:18px;
}

/* HOME PAGE */

#homePage{
    display:none;
}

/* INPUT */

.input-box{
    border:2px solid #eef0f8;
    border-radius:15px;
    padding:18px;
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:10px;
    color:#777;
    font-weight:bold;
}

.input-box input,
.input-box select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    font-size:20px;
    background:#f7f8ff;
    border-radius:10px;
}

/* BUTTON */

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#004cff,#3a8cff);
    color:#fff;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}

/* PANEL */

.box{
    background:#fff;
    border-radius:25px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.07);
    margin-bottom:20px;
}

/* TIMER */

.timer-wrapper{
    text-align:center;
    margin-bottom:18px;
}

.timer-title{
    font-size:16px;
    font-weight:bold;
    color:#111;
    margin-bottom:8px;
}

.timer-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:5px;
}

.time-card{
    width:38px;
    height:60px;
    background:#16164a;
    color:white;
    font-size:40px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    clip-path:polygon(
        0 0,
        100% 0,
        100% 82%,
        86% 100%,
        0 100%
    );
    border-radius:5px;
}

.colon{
    font-size:38px;
    font-weight:bold;
    color:#16164a;
}

/* PERIOD */

.period-box{
    width:170px;
    margin:auto;
    text-align:center;
    background:#f4f6ff;
    padding:10px 14px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
    color:#0055ff;
}

/* PREDICTION */

.circle{
    width:180px;
    height:180px;
    border-radius:50%;
    background:#eef2ff;
    margin:15px auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.circle span{
    color:#0055ff;
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.circle h1{
    font-size:62px;
    color:#0055ff;
}

/* NUMBER */

.number-box{
    width:150px;
    margin:auto;
    background:linear-gradient(to right,#004cff,#3a8cff);
    color:white;
    padding:12px;
    text-align:center;
    border-radius:12px;
    font-size:24px;
    font-weight:bold;
}

/* TELEGRAM */

.telegram-box{
    width:100%;
    padding:12px;
    border-radius:16px;
    margin-top:10px;
    margin-bottom:15px;
    background:#ffffff;
    border:2px solid #e5e7ff;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    display:flex;
    justify-content:center;
    align-items:center;
}

.telegram-link{
    width:65px;
    height:65px;
    border-radius:18px;
    background:linear-gradient(to bottom,#38bdf8,#0284c7);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
}

.telegram-link i{
    color:white;
    font-size:32px;
}

/* LOADING */

#loadingScreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#f5f7ff;
    z-index:9999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.loader{
    width:70px;
    height:70px;
    border:8px solid #dbe7ff;
    border-top:8px solid #0055ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.loading-text{
    margin-top:25px;
    color:#0055ff;
    font-size:28px;
    font-weight:bold;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* POPUP */

.popup{
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:18px 25px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    display:flex;
    align-items:center;
    gap:12px;
    z-index:99999;
    transition:0.4s;
}

.popup.show{
    top:30px;
}

.popup i{
    color:red;
    font-size:28px;
}

.popup span{
    font-size:18px;
    font-weight:bold;
    color:#222;
}

</style>
</head>

<body>

<!-- POPUP -->

<div class="popup" id="popup">

<i class="fa-solid fa-circle-xmark"></i>

<span>WRONG PASSWORD</span>

</div>

<!-- LOADING -->

<div id="loadingScreen">

<div class="loader"></div>

<div class="loading-text">
LOADING...
</div>

</div>

<div class="container">

<!-- LOCK SCREEN -->

<div class="card" id="lockScreen">

<div class="main-title">
<h1>LOCK</h1>
<p>ENTER PANEL</p>
</div>

<div class="input-box">
<label>Username</label>

<input type="text"
id="username"
placeholder="Enter Username">

</div>

<div class="input-box">
<label>Password</label>

<input type="password"
id="password"
placeholder="Enter Password">

</div>

<button class="btn"
onclick="unlockPanel()">

UNLOCK

</button>

</div>

<!-- HOME PAGE -->

<div class="card" id="homePage">

<div class="main-title">
<h1>VIP PANEL</h1>
<p>GOD_X TRADER'S</p>
</div>

<div class="box">

<div class="timer-wrapper">

<div class="timer-title">
Time remaining
</div>

<div class="timer-box">

<div class="time-card" id="min1">0</div>
<div class="time-card" id="min2">0</div>

<div class="colon">:</div>

<div class="time-card" id="sec1">5</div>
<div class="time-card" id="sec2">9</div>

</div>

</div>

<div class="period-box">
PERIOD:
<span id="periodText">333</span>
</div>

<div class="circle">
<span>PREDICTION</span>
<h1 id="bigSmallText">BIG</h1>
</div>

<div class="number-box">
NUMBER:
<span id="numberText">6</span>
</div>

</div>

<!-- TELEGRAM -->

<div class="telegram-box">

<a href="https://t.me/+bQmuA4xDeOQyMmFl"
target="_blank"
class="telegram-link">

<i class="fa-brands fa-telegram"></i>

</a>

</div>

<button class="btn"
onclick="openAdmin()">

ADMIN PANEL

</button>

</div>

<!-- ADMIN PAGE -->

<div class="card"
id="adminPage"
style="display:none;">

<div class="main-title">
<h1>ADMIN</h1>
<p>UPDATE PREDICTION</p>
</div>

<div class="input-box">
<label>Period</label>

<input type="text"
id="periodInput"
placeholder="Enter Period">

</div>

<div class="input-box">

<label>BIG / SMALL</label>

<select id="bigSmallInput">

<option>BIG</option>
<option>SMALL</option>

</select>

</div>

<div class="input-box">

<label>Number</label>

<select id="numberInput">

<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>

</select>

</div>

<button class="btn"
onclick="updateData()">

UPDATE

</button>

<button class="btn"
style="
background:white;
color:#0055ff;
border:2px solid #dfe7ff;
"
onclick="closeAdmin()">

BACK

</button>

</div>

</div>

<script>

/* UNLOCK */

function unlockPanel(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "TRADERX"
    && password === "UNLOCK888"){

        document.getElementById("loadingScreen")
        .style.display="flex";

        setTimeout(()=>{

            document.getElementById("loadingScreen")
            .style.display="none";

            document.getElementById("lockScreen")
            .style.display="none";

            document.getElementById("homePage")
            .style.display="block";

        },2500);

    }else{

        let popup =
        document.getElementById("popup");

        popup.classList.add("show");

        setTimeout(()=>{

            popup.classList.remove("show");

        },2500);

    }

}

/* OPEN ADMIN */

function openAdmin(){

    document.getElementById("homePage")
    .style.display="none";

    document.getElementById("adminPage")
    .style.display="block";

}

/* CLOSE ADMIN */

function closeAdmin(){

    document.getElementById("adminPage")
    .style.display="none";

    document.getElementById("homePage")
    .style.display="block";

}

/* UPDATE DATA */

function updateData(){

    let period =
    document.getElementById("periodInput").value;

    let bigsmall =
    document.getElementById("bigSmallInput").value;

    let number =
    document.getElementById("numberInput").value;

    document.getElementById("periodText")
    .innerText = period;

    document.getElementById("bigSmallText")
    .innerText = bigsmall;

    document.getElementById("numberText")
    .innerText = number;

    closeAdmin();

}

/* TIMER */

function updateCountdown(){

    const now = new Date();

    const seconds = 59 - now.getSeconds();

    const mins = 0;

    const minuteString =
    String(mins).padStart(2,'0');

    const secondString =
    String(seconds).padStart(2,'0');

    document.getElementById("min1").innerText =
    minuteString[0];

    document.getElementById("min2").innerText =
    minuteString[1];

    document.getElementById("sec1").innerText =
    secondString[0];

    document.getElementById("sec2").innerText =
    secondString[1];

}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

</body>
</html>
