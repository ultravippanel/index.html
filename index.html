<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

h1 { color:#00ff88; }
.sub { color:gold; }

.box {
    border:1px solid #00ff88;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

h2 {
    font-size:40px;
    color:#00ff88;
}

table {
    width:100%;
    margin-top:20px;
}

.win { color:#00ff88; }
.loss { color:red; }

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#00ff88;
    cursor:pointer;
}

input {
    padding:8px;
    margin:5px;
}
</style>
</head>

<body>

<!-- MAIN PANEL -->
<div id="mainPanel">
    <h1>VIP PANEL</h1>
    <p class="sub">VIP TRADER</p>

    <div class="box">
        <p>PERIOD: <span id="period"></span></p>
        <h2 id="result"></h2>
        <p>NUMBERS: <span id="numbers"></span></p>
    </div>

    <table border="1">
        <thead>
            <tr>
                <th>PRD</th>
                <th>PRED</th>
                <th>NUM</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>

    <button onclick="openAdmin()">ADMIN PANEL</button>
</div>


<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
    <h2>ADMIN CONTROL</h2>

    <input id="periodInput" placeholder="Period"><br>
    <input id="resultInput" placeholder="BIG/SMALL"><br>
    <input id="numberInput" placeholder="Number"><br>
    <input id="statusInput" placeholder="WIN/LOSS"><br>

    <button onclick="updateData()">UPDATE</button>
    <button onclick="back()">BACK</button>
</div>


<script>

let data = JSON.parse(localStorage.getItem("vipData")) || {
    period:"20260325100010156",
    result:"BIG",
    numbers:"9,3",
    history:[]
};

function load(){
    document.getElementById("period").innerText = data.period;
    document.getElementById("result").innerText = data.result;
    document.getElementById("numbers").innerText = data.numbers;

    let table = document.getElementById("history");
    table.innerHTML = "";

    data.history.slice().reverse().forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.prd}</td>
            <td>${item.pred}</td>
            <td>${item.num}</td>
            <td class="${item.status=='WIN'?'win':'loss'}">${item.status}</td>
        </tr>`;
    });
}

load();

function openAdmin(){
    document.getElementById("mainPanel").style.display="none";
    document.getElementById("adminPanel").style.display="block";
}

function back(){
    document.getElementById("mainPanel").style.display="block";
    document.getElementById("adminPanel").style.display="none";
}

function updateData(){
    let prd = document.getElementById("periodInput").value;
    let res = document.getElementById("resultInput").value;
    let num = document.getElementById("numberInput").value;
    let status = document.getElementById("statusInput").value;

    data.period = prd;
    data.result = res;
    data.numbers = num;

    data.history.push({
        prd: prd.slice(-3),
        pred: res,
        num: num,
        status: status
    });

    localStorage.setItem("vipData", JSON.stringify(data));

    alert("Updated ✅");

    back();
    load();
}

</script>

</body>
</html>
